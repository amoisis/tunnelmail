services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/tunnelmail:cached
    command: sleep infinity
    environment:
      SMTP_HOST: mailhog:1025
      HTTP_PORT: 8080
    depends_on:
      - mailhog

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"
