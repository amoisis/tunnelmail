services:
  tunnelmail:
    image: tunnelmail:latest
    environment:
      SMTP_HOST: smtp.example.com:587
      SMTP_EHLO_HOST: tunnelmail.example.com
      SMTP_EHLO_USE_CLIENT_REVERSE_DNS: "false"
      SMTP_ENVELOPE_FROM: relay@example.com
      SMTP_USE_PROXY_PROTOCOL: "false"
      HTTP_PORT: 8080
    ports:
      - "8080:8080"
